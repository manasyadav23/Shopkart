{% extends 'base.html' %}
{% block title %}My Profile - ShopKart{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-primary py-5 text-center text-white position-relative">
                    <div class="profile-avatar-large shadow">
                        <i class="fas fa-user fa-3x"></i>
                    </div>
                </div>
                <div class="card-body pt-5 px-4 pb-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold mb-1">{{ user.name }}</h3>
                        <span class="badge rounded-pill {% if user.role == 'seller' %}bg-success-subtle text-success{% else %}bg-primary-subtle text-primary{% endif %} px-3">
                            {{ user.role|capitalize }} Account
                        </span>
                    </div>

                    <div class="profile-info-grid">
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-envelope me-2 text-primary"></i>Email Address</div>
                            <div class="info-value">{{ user.email }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-id-card me-2 text-primary"></i>User ID</div>
                            <div class="info-value">#SK-USER-{{ user.id }}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label"><i class="fas fa-calendar-alt me-2 text-primary"></i>Member Since</div>
                            <div class="info-value">{{ user.created_at }}</div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <a href="{{ url_for('edit_profile') }}" class="btn btn-primary rounded-pill py-2">
                            <i class="fas fa-edit me-2"></i>Edit Profile
                        </a>
                        <a href="{{ url_for('orders') }}" class="btn btn-outline-primary rounded-pill py-2">
                            <i class="fas fa-history me-2"></i>View Order History
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.profile-avatar-large {
    width: 100px;
    height: 100px;
    background: white;
    color: var(--primary-color, #2874f0);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid white;
}
.profile-info-grid {
    display: grid;
    gap: 20px;
    margin-top: 20px;
}
.info-item {
    padding: 15px;
    background: #f8f9fa;
    border-radius: 12px;
}
.info-label {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    color: #6c757d;
    margin-bottom: 5px;
}
.info-value {
    font-weight: 600;
    color: #212529;
}
.rounded-4 { border-radius: 1rem !important; }
.bg-success-subtle { background-color: #d1e7dd !important; }
.bg-primary-subtle { background-color: #cfe2ff !important; }
</style>
{% endblock %}
